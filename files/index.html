<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>記帳本 · MoneyFlow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --income: #34d399;
      --expense: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── AUTH PAGES ─────────────────────────── */
    #auth-view {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: radial-gradient(ellipse at 50% 0%, #1e1a4a 0%, var(--bg) 60%);
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 30px;
    }

    .tab-row {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px;
      overflow: hidden;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
      font-weight: 600;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      color: var(--expense);
      font-size: 0.85rem;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
    }

    /* ── MAIN APP ───────────────────────────── */
    #app-view { display: none; }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-logo {
      font-weight: 800;
      font-size: 1.2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nav-username {
      color: var(--muted);
      font-size: 0.875rem;
    }

    .btn-logout {
      padding: 7px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .btn-logout:hover { background: var(--border); }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    /* ── SUMMARY CARDS ──────────────────────── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .summary-card .s-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .summary-card .s-amount {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .s-income { color: var(--income); }
    .s-expense { color: var(--expense); }
    .s-balance { color: var(--accent2); }

    /* ── ADD FORM ───────────────────────────── */
    .add-form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 28px;
    }

    .add-form-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 18px;
      color: var(--accent2);
    }

    .form-row {
      display: grid;
      grid-template-columns: 2fr 1.2fr 1fr 1fr;
      gap: 12px;
      align-items: end;
    }

    .type-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .type-btn {
      flex: 1;
      padding: 12px 6px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.2s;
    }

    .type-btn.active-income { background: var(--income); color: #0f1117; }
    .type-btn.active-expense { background: var(--expense); color: #0f1117; }

    .btn-add {
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover { opacity: 0.85; }

    /* ── RECORDS LIST ───────────────────────── */
    .records-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .records-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
    }

    .record-list { display: flex; flex-direction: column; gap: 10px; }

    .record-item {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      gap: 14px;
      transition: border-color 0.2s;
    }

    .record-item:hover { border-color: var(--accent); }

    .record-type-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-income { background: var(--income); }
    .dot-expense { background: var(--expense); }

    .record-info { flex: 1; min-width: 0; }

    .record-title {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .record-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .category-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--surface2);
      border: 1px solid var(--border);
      margin-right: 6px;
    }

    .record-amount {
      font-weight: 700;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .btn-delete {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      border-color: var(--expense);
      color: var(--expense);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    @media (max-width: 640px) {
      .summary-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr 1fr; }
      .form-row .btn-add { grid-column: span 2; }
      .navbar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<!-- ── AUTH VIEW ── -->
<div id="auth-view">
  <div class="auth-card">
    <div class="auth-logo">💰 MoneyFlow</div>
    <p class="auth-sub">個人記帳管理系統</p>

    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">登入</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">註冊</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label>帳號</label>
        <input type="text" id="login-username" placeholder="輸入帳號" />
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="login-password" placeholder="輸入密碼" />
      </div>
      <button class="btn-primary" onclick="handleLogin()">登入</button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <!-- Register Form -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>帳號</label>
        <input type="text" id="reg-username" placeholder="設定帳號" />
      </div>
      <div class="form-group">
        <label>密碼（至少 6 個字元）</label>
        <input type="password" id="reg-password" placeholder="設定密碼（至少6字）" />
      </div>
      <button class="btn-primary" onclick="handleRegister()">註冊帳號</button>
      <div class="error-msg" id="reg-error"></div>
    </div>
  </div>
</div>

<!-- ── MAIN APP VIEW ── -->
<div id="app-view">
  <nav class="navbar">
    <div class="nav-logo">💰 MoneyFlow</div>
    <div class="nav-user">
      <span class="nav-username" id="nav-username"></span>
      <button class="btn-logout" onclick="handleLogout()">登出</button>
    </div>
  </nav>

  <div class="container">
    <!-- Summary -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="s-label">總收入</div>
        <div class="s-amount s-income" id="total-income">$0</div>
      </div>
      <div class="summary-card">
        <div class="s-label">總支出</div>
        <div class="s-amount s-expense" id="total-expense">$0</div>
      </div>
      <div class="summary-card">
        <div class="s-label">結餘</div>
        <div class="s-amount s-balance" id="total-balance">$0</div>
      </div>
    </div>

    <!-- Add Record Form -->
    <div class="add-form-card">
      <h2>➕ 新增記帳</h2>
      <div class="form-row">
        <div class="form-group" style="margin:0">
          <label>名稱</label>
          <input type="text" id="new-title" placeholder="例：早餐、薪資..." />
        </div>
        <div class="form-group" style="margin:0">
          <label>金額</label>
          <input type="number" id="new-amount" placeholder="0" min="0" />
        </div>
        <div class="form-group" style="margin:0">
          <label>分類</label>
          <select id="new-category">
            <option value="餐飲">🍜 餐飲</option>
            <option value="交通">🚌 交通</option>
            <option value="娛樂">🎮 娛樂</option>
            <option value="購物">🛒 購物</option>
            <option value="薪資">💼 薪資</option>
            <option value="其他">📦 其他</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label>類型</label>
          <div class="type-toggle">
            <button class="type-btn active-income" id="type-income" onclick="setType('income')">收入</button>
            <button class="type-btn" id="type-expense" onclick="setType('expense')">支出</button>
          </div>
        </div>
      </div>
      <div style="margin-top:14px; text-align:right">
        <button class="btn-add" onclick="handleAddRecord()">新增記錄</button>
      </div>
      <div class="error-msg" id="add-error"></div>
    </div>

    <!-- Records -->
    <div class="records-header">
      <h2>📋 記帳明細</h2>
    </div>
    <div class="record-list" id="record-list">
      <div class="empty-state">
        <div class="icon">📭</div>
        <div>尚無記錄，開始記帳吧！</div>
      </div>
    </div>
  </div>
</div>

<script>
  // ── STATE ──────────────────────────────────
  let currentType = 'income';
  let records = [];

  // ── INIT ───────────────────────────────────
  async function init() {
    const res = await fetch('/api/auth/me');
    const data = await res.json();
    if (data.loggedIn) {
      showApp(data.username);
      loadRecords();
    } else {
      showAuth();
    }
  }

  // ── VIEW SWITCHING ─────────────────────────
  function showAuth() {
    document.getElementById('auth-view').style.display = 'flex';
    document.getElementById('app-view').style.display = 'none';
  }

  function showApp(username) {
    document.getElementById('auth-view').style.display = 'none';
    document.getElementById('app-view').style.display = 'block';
    document.getElementById('nav-username').textContent = `👤 ${username}`;
  }

  function switchTab(tab) {
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('login-error').textContent = '';
    document.getElementById('reg-error').textContent = '';
  }

  // ── AUTH ───────────────────────────────────
  async function handleLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');

    if (!username || !password) { errEl.textContent = '請填寫帳號與密碼'; return; }

    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();

    if (res.ok) {
      showApp(data.username);
      loadRecords();
    } else {
      errEl.textContent = data.error;
    }
  }

  async function handleRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const errEl = document.getElementById('reg-error');

    if (!username || !password) { errEl.textContent = '請填寫帳號與密碼'; return; }

    // ✅ 前端密碼長度驗證（加分項）
    if (password.length < 6) {
      errEl.textContent = '⚠️ 密碼至少需要 6 個字元';
      return;
    }

    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();

    if (res.ok) {
      showApp(data.username);
      loadRecords();
    } else {
      errEl.textContent = data.error;
    }
  }

  async function handleLogout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    records = [];
    showAuth();
  }

  // ── RECORDS ────────────────────────────────
  async function loadRecords() {
    const res = await fetch('/api/accounts');
    if (res.status === 401) { showAuth(); return; }
    records = await res.json();
    renderRecords();
  }

  function renderRecords() {
    const list = document.getElementById('record-list');
    updateSummary();

    if (records.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div>尚無記錄，開始記帳吧！</div></div>`;
      return;
    }

    list.innerHTML = records.map(r => {
      const isIncome = r.type === 'income';
      const sign = isIncome ? '+' : '-';
      const colorClass = isIncome ? 's-income' : 's-expense';
      const dotClass = isIncome ? 'dot-income' : 'dot-expense';
      const date = new Date(r.date).toLocaleDateString('zh-TW');

      return `
        <div class="record-item">
          <div class="record-type-dot ${dotClass}"></div>
          <div class="record-info">
            <div class="record-title">${escapeHtml(r.title)}</div>
            <div class="record-meta">
              <span class="category-badge">${r.category}</span>${date}
            </div>
          </div>
          <div class="record-amount ${colorClass}">${sign}$${r.amount.toLocaleString()}</div>
          <button class="btn-delete" onclick="handleDelete('${r._id}')">刪除</button>
        </div>
      `;
    }).join('');
  }

  function updateSummary() {
    const income = records.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0);
    const expense = records.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0);
    const balance = income - expense;

    document.getElementById('total-income').textContent = `+$${income.toLocaleString()}`;
    document.getElementById('total-expense').textContent = `-$${expense.toLocaleString()}`;
    document.getElementById('total-balance').textContent = `$${balance.toLocaleString()}`;
    document.getElementById('total-balance').style.color = balance >= 0 ? 'var(--income)' : 'var(--expense)';
  }

  async function handleAddRecord() {
    const title = document.getElementById('new-title').value.trim();
    const amount = document.getElementById('new-amount').value;
    const category = document.getElementById('new-category').value;
    const errEl = document.getElementById('add-error');

    if (!title || !amount) { errEl.textContent = '請填寫名稱與金額'; return; }
    if (Number(amount) <= 0) { errEl.textContent = '金額必須大於 0'; return; }

    const res = await fetch('/api/accounts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, amount: Number(amount), type: currentType, category }),
    });

    if (res.status === 401) { showAuth(); return; }
    const newRecord = await res.json();

    if (res.ok) {
      records.unshift(newRecord);
      renderRecords();
      document.getElementById('new-title').value = '';
      document.getElementById('new-amount').value = '';
      errEl.textContent = '';
    } else {
      errEl.textContent = newRecord.error;
    }
  }

  async function handleDelete(id) {
    const res = await fetch(`/api/accounts/${id}`, { method: 'DELETE' });
    if (res.status === 401) { showAuth(); return; }

    if (res.ok) {
      records = records.filter(r => r._id !== id);
      renderRecords();
    }
  }

  function setType(type) {
    currentType = type;
    document.getElementById('type-income').className = `type-btn${type === 'income' ? ' active-income' : ''}`;
    document.getElementById('type-expense').className = `type-btn${type === 'expense' ? ' active-expense' : ''}`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── KEYBOARD SUPPORT ───────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (document.getElementById('login-form').style.display !== 'none' &&
          document.getElementById('auth-view').style.display !== 'none') handleLogin();
      if (document.getElementById('register-form').style.display === 'block' &&
          document.getElementById('auth-view').style.display !== 'none') handleRegister();
    }
  });

  init();
</script>
</body>
</html>
